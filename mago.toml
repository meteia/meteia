# Welcome to Mago!
# For full documentation, see https://mago.carthage.software/tools/overview
php-version = "8.5.0"

[source]
paths = ["Meteia/"]
includes = ["vendor"]
excludes = ["**/*Spec.php"]

[formatter]
print-width = 120
tab-width = 4
use-tabs = false
null-type-hint = "question"
empty-line-before-return = true

[linter]
integrations = ["symfony", "phpunit"]

[linter.rules]
ambiguous-function-call = { enabled = false }
literal-named-argument = { enabled = false }
halstead = { effort-threshold = 7000 }
no-fully-qualified-global-class-like = { enabled = true }
cyclomatic-complexity = { threshold = 30 }
excessive-parameter-list = { threshold = 10 }
too-many-methods = { threshold = 20 }
# UoW classes carry intentional complexity for DB-transaction atomicity (persist then publish)
# + proper ExpectedVersion handling. The kan-defect heuristic is a guideline, not a hard rule
# when correctness and explicit transaction boundaries are the goal.
kan-defect = { threshold = 2.5 }

[analyzer]
plugins = []
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = false
memoize-properties = true
strict-array-index-existence = true
check-throws = false
check-missing-override = true
find-unused-parameters = true
strict-list-index-checks = true
no-boolean-literal-comparison = false
check-missing-type-hints = false
register-super-globals = true
